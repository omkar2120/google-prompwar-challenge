name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: Lint, test & build
    runs-on: ubuntu-latest

    # Dummy env so the build/tests never require real secrets. The app is
    # designed to run without keys (guest / local-only mode), and every test
    # mocks its own network + env, so empty placeholders are enough for CI.
    env:
      VITE_GROQ_API_KEY: ''
      VITE_GROQ_PROXY_URL: ''
      VITE_FIREBASE_API_KEY: ''
      VITE_FIREBASE_AUTH_DOMAIN: ''
      VITE_FIREBASE_PROJECT_ID: ''
      VITE_FIREBASE_STORAGE_BUCKET: ''
      VITE_FIREBASE_MESSAGING_SENDER_ID: ''
      VITE_FIREBASE_APP_ID: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (0 warnings enforced)
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
